name: Package Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
        pip install setuptools

    - name: Install CRABS v0.1.7
      run: |
        CRABS_VERSION="0.1.7"
        CRABS_RELEASE="https://github.com/gjeunen/reference_database_creator/archive/v${CRABS_VERSION}.tar.gz"
        CRABS_ARCHIVE="crabs-${CRABS_VERSION}.tar.gz"
        CRABS_DIR="reference_database_creator-${CRABS_VERSION}"

        # Download specific version
        wget "$CRABS_RELEASE" -O "$CRABS_ARCHIVE"

        # Extract and install
        tar -xzf "$CRABS_ARCHIVE"
        cd "$CRABS_DIR"
        pip install .
        cd ..

        # Cleanup
        rm -f "$CRABS_ARCHIVE"

        # Verify installation
        crabs --version

    - name: Install cutadapt
      run: |
        pip install cutadapt

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> "$GITHUB_ENV"

    - name: Run tests
      run: pytest --cov=./ --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}