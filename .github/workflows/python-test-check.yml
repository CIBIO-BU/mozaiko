name: Package Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov
        pip install setuptools

    - name: Install CRABS v0.1.7
      run: |
        set -e

        CRABS_VERSION="0.1.7"
        EXTERNAL_SCRIPTS_DIR="$(pwd)/external_scripts"

        CRABS_ARCHIVE="$EXTERNAL_SCRIPTS_DIR/crabs-0.1.7.zip"
        CRABS_DIR="$EXTERNAL_SCRIPTS_DIR/crabs-0.1.7"

        echo "Checking CRABS installation"

        if command -v crabs &> /dev/null; then
          crabs_output=$(crabs --version 2>&1 | tail -n 1)
          crabs_version=${crabs_output##* }

          if [ "$crabs_version" = "$CRABS_VERSION" ]; then
            echo "CRABS v0.1.7 already installed"
            exit 0
          fi
        fi

        echo "Installing CRABS v0.1.7 from local archive"

        if [ ! -f "$CRABS_ARCHIVE" ]; then
          echo "CRABS archive not found at $CRABS_ARCHIVE"
          exit 1
        fi

        unzip -o "$CRABS_ARCHIVE"

        cd "$CRABS_DIR"

        pip install .

        crabs --version

    - name: Install cutadapt
      run: |
        pip install cutadapt

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> "$GITHUB_ENV"

    - name: Run tests
      run: pytest --cov=./ --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}