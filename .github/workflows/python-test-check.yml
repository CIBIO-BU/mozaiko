name: Package Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov setuptools pandas tqdm matplotlib numpy biopython pyyaml

    - name: Install CRABS v0.1.7
      run: |
        echo "Checking CRABS installation"

        if command -v crabs &> /dev/null; then
            crabs_output=$(crabs --version 2>&1 | tail -n 1)
            crabs_version=${crabs_output##* }

            if [ "$crabs_version" = "0.1.7" ]; then
                echo "CRABS v0.1.7 is already installed"
                exit 0
            else
                echo "CRABS version $crabs_version is installed, but v0.1.7 is required"
                exit 1
            fi
        fi

        EXTERNAL_SCRIPTS_DIR="$(pwd)/external_scripts"
        CRABS_ARCHIVE="$EXTERNAL_SCRIPTS_DIR/crabs-0.1.7.zip"

        if [ ! -f "$CRABS_ARCHIVE" ]; then
            echo "CRABS archive not found at $CRABS_ARCHIVE"
            exit 1
        fi

        cd "$EXTERNAL_SCRIPTS_DIR"

        echo "Unzipping CRABS archive"
        unzip -o "$CRABS_ARCHIVE"

        CRABS_DIR="$EXTERNAL_SCRIPTS_DIR/crabs-0.1.7"

        if [ ! -d "$CRABS_DIR" ]; then
            echo "CRABS directory not found after unzip"
            exit 1
        fi

        cd "$CRABS_DIR"

        echo "Installing CRABS package"
        pip install .

        echo "CRABS installation complete"

        crabs --version

    - name: Install cutadapt
      run: |
        pip install cutadapt

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> "$GITHUB_ENV"

    - name: Run tests
      run: pytest --cov=./ --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}