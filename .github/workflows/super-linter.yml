---
  name: Package Linting
  on:
    push:
      branches: ["main"]
    pull_request:
      branches: ["main"]
  permissions:
    contents: read
  jobs:
    run-lint:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
          with:
            fetch-depth: 0

        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.12'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install isort black # Install isort and black
            pip install types-requests types-setuptools
            pip install mypy types-requests types-setuptools

        - name: Set PYTHONPATH
          run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> "$GITHUB_ENV"

        - name: Create MyPy cache directory
          run: mkdir -p .mypy_cache

        - name: Sort imports with isort
          run: |
            isort .

        - name: Format with black
          run: |
            black .

        - name: Lint Code Base
          uses: github/super-linter@v4
          env:
            VALIDATE_ALL_CODEBASE: false
            DEFAULT_BRANCH: "main"
            GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
            LINTER_RULES_PATH: '/'
            PYTHON_MYPY_CONFIG_FILE: mypy.ini
            VALIDATE_PYTHON_MYPY: true
            PYTHON_MYPY_ARGS: "--non-interactive --ignore-missing-imports"